name: Dependabot auto-merge

# Auto-approves and enables auto-merge for Dependabot PRs. Auto-merge waits for the
# required status checks (branch protection) before merging, so a bump that breaks
# CI will NOT merge. Major-version bumps are left for manual review.

on: pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Auto-merge patch + minor bumps and any GitHub Actions update. Major bumps of
      # application dependencies are skipped (they need a human look).
      - name: Approve and enable auto-merge
        if: >
          steps.meta.outputs.update-type != 'version-update:semver-major' ||
          steps.meta.outputs.package-ecosystem == 'github_actions'
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
